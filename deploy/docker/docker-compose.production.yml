services:
  postgres:
    image: public.ecr.aws/docker/library/postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tma_owner
      POSTGRES_PASSWORD: ${TMA_POSTGRES_OWNER_PASSWORD:?set TMA_POSTGRES_OWNER_PASSWORD}
      POSTGRES_DB: tma
      TMA_RUNTIME_DB_PASSWORD: ${TMA_RUNTIME_DB_PASSWORD:?set TMA_RUNTIME_DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../../sql/baselines/000080_baseline.sql:/docker-entrypoint-initdb.d/010-baseline.sql:ro
      - ../postgres/runtime-grants.sql:/opt/tma/sql/runtime-grants.sql:ro
      - ./postgres-init/020-runtime-role.sh:/docker-entrypoint-initdb.d/020-runtime-role.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tma_owner -d tma"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks: [backend]

  server:
    image: ${TMA_SERVER_IMAGE:-tma-server:local}
    build:
      context: ../..
      target: server-docker
    restart: unless-stopped
    env_file: ${TMA_ENV_FILE:-.env.production}
    environment:
      TMA_DATABASE_URL: postgres://tma_runtime:${TMA_RUNTIME_DB_PASSWORD}@postgres:5432/tma?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${TMA_HTTP_BIND:-127.0.0.1}:${TMA_HTTP_PORT:-8080}:8080"
    group_add:
      - "${TMA_DOCKER_GID:?set TMA_DOCKER_GID}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/tma:/var/lib/tma
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [backend]

  worker:
    profiles: ["worker"]
    image: ${TMA_WORKER_IMAGE:-tma-worker:local}
    build:
      context: ../..
      target: worker
    restart: unless-stopped
    environment:
      TMA_BASE_URL: http://server:8080
      TMA_WORKER_TOKEN: ${TMA_WORKER_AUTH_TOKEN:?set TMA_WORKER_AUTH_TOKEN}
      TMA_WORKER_WORKSPACE_ID: ${TMA_WORKER_AUTH_WORKSPACE_ID:-wksp_default}
      TMA_WORKER_TYPE: local
      TMA_WORKER_CONCURRENCY: ${TMA_WORKER_CONCURRENCY:-2}
      TMA_ENV_ENCRYPTION_KEY: ${TMA_ENV_ENCRYPTION_KEY:-}
    depends_on:
      server:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
      - /workspace:size=2g,mode=0700,uid=10001,gid=10001
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    networks: [backend]

volumes:
  postgres-data:

networks:
  backend:
    driver: bridge
