apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tma
  namespace: tma
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-body-size: 50m
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [tma.example.com]
      secretName: tma-tls
  rules:
    - host: tma.example.com
      http:
        paths:
          - path: /v2/extensions/browser
            pathType: Prefix
            backend:
              service:
                name: tma-browser-gateway
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tma-server
                port:
                  name: http
