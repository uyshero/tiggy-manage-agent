apiVersion: v1
kind: ServiceAccount
metadata:
  name: tma-server
  namespace: tma
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tma-server
  namespace: tma
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: tma-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tma-server
    spec:
      serviceAccountName: tma-server
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: server
          image: registry.example.com/tma-server:0.1.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: tma-config
            - secretRef:
                name: tma-runtime-secrets
          ports:
            - name: http
              containerPort: 8080
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: tma-server
  namespace: tma
spec:
  selector:
    app.kubernetes.io/name: tma-server
  ports:
    - name: http
      port: 8080
      targetPort: http

