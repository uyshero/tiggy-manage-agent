apiVersion: v1
kind: ServiceAccount
metadata:
  name: tma-worker
  namespace: tma
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tma-worker
  namespace: tma
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: tma-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tma-worker
    spec:
      serviceAccountName: tma-worker
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: registry.example.com/tma-worker:0.1.0
          imagePullPolicy: IfNotPresent
          workingDir: /workspace
          env:
            - name: TMA_BASE_URL
              value: http://tma-server:8080
            - name: TMA_WORKER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tma-runtime-secrets
                  key: TMA_WORKER_AUTH_TOKEN
            - name: TMA_ENV_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: tma-runtime-secrets
                  key: TMA_ENV_ENCRYPTION_KEY
            - name: TMA_WORKER_WORKSPACE_ID
              valueFrom:
                configMapKeyRef:
                  name: tma-config
                  key: TMA_WORKER_AUTH_WORKSPACE_ID
            - name: TMA_WORKER_TYPE
              value: local
            - name: TMA_WORKER_CONCURRENCY
              value: "2"
            - name: TMA_WORKER_SHUTDOWN_TIMEOUT
              value: 45s
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: workspace
          emptyDir:
            sizeLimit: 5Gi
        - name: tmp
          emptyDir:
            sizeLimit: 1Gi

