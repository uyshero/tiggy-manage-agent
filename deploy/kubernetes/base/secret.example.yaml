apiVersion: v1
kind: Secret
metadata:
  name: tma-runtime-secrets
  namespace: tma
type: Opaque
stringData:
  TMA_DATABASE_URL: postgres://tma_runtime:replace-me@postgres.example.com:5432/tma?sslmode=require
  TMA_WORKER_AUTH_TOKEN: replace-with-random-worker-token
  TMA_WORKER_CONTROL_AUTH_TOKEN: replace-with-separate-control-token
  TMA_OBJECT_STORAGE_ACCESS_KEY: replace-with-access-key
  TMA_OBJECT_STORAGE_SECRET_KEY: replace-with-secret-key
  TMA_LLM_API_KEY: replace-with-llm-key
  TMA_ENV_ENCRYPTION_KEY: replace-with-openssl-rand-base64-32-output
---
apiVersion: v1
kind: Secret
metadata:
  name: tma-migration-secrets
  namespace: tma
type: Opaque
stringData:
  TMA_MIGRATION_DATABASE_URL: postgres://tma_owner:replace-me@postgres.example.com:5432/tma?sslmode=require

