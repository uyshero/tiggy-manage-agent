apiVersion: batch/v1
kind: Job
metadata:
  name: tma-database-baseline-000088
  namespace: tma
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tma-database-migration
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: registry.example.com/tma-migrate:0.1.0
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-ec"]
          args:
            - |
              psql "$TMA_MIGRATION_DATABASE_URL" -v ON_ERROR_STOP=1 --single-transaction -f /opt/tma/sql/000091_baseline.sql
              psql "$TMA_MIGRATION_DATABASE_URL" -v ON_ERROR_STOP=1 -f /opt/tma/sql/runtime-grants.sql
          env:
            - name: TMA_MIGRATION_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tma-migration-secrets
                  key: TMA_MIGRATION_DATABASE_URL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 70
            runAsGroup: 70
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 128Mi
