services:
  sandbox:
    build:
      context: ../..
      dockerfile: deploy/image-to-editable-ppt-sandbox/Dockerfile
    image: tma-image-to-editable-ppt-sandbox:local
    command: ["sh", "-c", "while :; do sleep 3600; done"]
    volumes:
      - ./workspace:/workspace
      - sandbox-data:/mnt/data
    cpus: 1.0
    mem_limit: 4g
    pids_limit: 256
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "tma-ppt-sandbox-doctor"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  sandbox-data:
