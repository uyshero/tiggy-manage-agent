services:
  postgres:
    image: postgres:16-alpine
    container_name: tma-postgres
    environment:
      POSTGRES_USER: tma
      POSTGRES_PASSWORD: tma
      POSTGRES_DB: tma
    ports:
      - "5432:5432"
    volumes:
      - tma-postgres-data:/var/lib/postgresql/data
      - ./sql/migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tma -d tma"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  tma-postgres-data:
