    EventList:
      type: object
      required: [events]
      properties:
        events:
          type: array
          items: {$ref: "#/components/schemas/Event"}
    EventStream:
      type: string
      description: Server-sent event stream whose data fields contain Event JSON.
    AgentConfigVersion:
