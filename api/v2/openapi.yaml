        value: {type: string, writeOnly: true}
    MCPConfigValue:
      oneOf:
        - {type: string}
        - type: object
          minProperties: 1
          maxProperties: 1
          additionalProperties: false
          properties:
            value: {type: string, writeOnly: true}
            env_ref: {type: string}
            secret_ref: {type: string}
    MCPRoot:
      type: object
      required: [uri]
      properties:
        uri: {type: string}
        name: {type: string}
    MCPRuntimePolicy:
      type: object
      properties:
        timeout_seconds: {type: integer, format: int32}
        max_concurrency: {type: integer, format: int32}
        failure_threshold: {type: integer, format: int32}
        cooldown_seconds: {type: integer, format: int32}
    MCPRegistrySource:
      type: object
      required: [server_id, version]
      properties:
        server_id: {type: string}
        version: {type: integer, format: int32}
